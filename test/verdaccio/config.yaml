storage: /verdaccio/storage

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  "@*/*":
    access: $all
    publish: $anonymous
    unpublish: $all
    proxy: npmjs
  "**":
    access: $all
    publish: $anonymous
    unpublish: $all
    proxy: npmjs

log:
  - { type: stdout, format: pretty, level: http }
