name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    name: CI - node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v4
      - name: set node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm ci
        run: npm ci
      - name: npm test
        run: npm test

  azure-e2e:
    name: Azure E2E
    runs-on: ubuntu-latest
    needs: test
    if: >-
      ${{
        secrets.AZURE_DEVOPS_TOKEN_OPENUPM_PIPELINE != '' &&
        (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/'))
      }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: set node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: npm ci
        run: npm ci
      - name: Run Azure e2e fixture
        env:
          AZURE_DEVOPS_TOKEN_OPENUPM_PIPELINE: ${{ secrets.AZURE_DEVOPS_TOKEN_OPENUPM_PIPELINE }}
          SOURCE_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: node scripts/runAzureFixture.js --source-branch "$SOURCE_BRANCH"
